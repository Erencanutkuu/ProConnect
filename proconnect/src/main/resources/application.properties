spring.application.name=proconnect
# Load .env from workspace root or module root
spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/proconnect/.env[.properties]
# 1. Veritabanı Bağlantı Bilgileri
spring.datasource.url=jdbc:postgresql://localhost:5432/proconnect_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# 2. Hibernate/JPA Ayarları (Tabloları Otomatik Oluşturur)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# JWT Ayarları
spring.jwt.secret=6180087886a17aa4a617ce01228331d44aa42ee4ded7943840e4f56bfca22bfaa06828be0a56b4a7a83e73ff2d739f88280f7468116e7d53e9f426e96b3b3a94
spring.jwt.expiration=3600000  # 1 saat (milisaniye cinsinden)

# OpenAI API
openai.api.key=${OPENAI_API_KEY:}