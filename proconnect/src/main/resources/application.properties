spring.application.name=proconnect
# Load .env from workspace root or module root
spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/proconnect/.env[.properties]
# 1. Veritabanı Bağlantı Bilgileri
spring.datasource.url=jdbc:postgresql://localhost:5432/proconnect_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# 2. Hibernate/JPA Ayarları (Tabloları Otomatik Oluşturur)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
