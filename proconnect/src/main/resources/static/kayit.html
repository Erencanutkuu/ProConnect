<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ProConnect - Kayıt Ol</title>
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <div class="form-container">
        <h2>Kayıt Ol</h2>
        <input type="text" id="ad" placeholder="Ad">
        <input type="text" id="soyad" placeholder="Soyad">
        <input type="email" id="eposta" placeholder="E-posta">
        <input type="password" id="sifre" placeholder="Şifre">
        
        <select id="rol" onchange="rolDegisti()">
            <option value="MUSTERI">Müşteri</option>
            <option value="USTA">Usta</option>
        </select>

        <div id="usta-ozel-alanlar">
            <input type="text" id="tcno" placeholder="TC Kimlik No" maxlength="11">
        </div>

        <button onclick="kayitOl()">Kaydet</button>
        <p id="mesaj"></p>
        <a href="login.html" class="geri-link">← Giriş Yap</a>
        <a href="index.html" class="geri-link">← Ana Sayfaya Dön</a>
    </div>

    <script>
        // Rol değiştiğinde TC alanını göster/gizle
        function rolDegisti() {
            const rol = document.getElementById('rol').value;
            const ustaAlani = document.getElementById('usta-ozel-alanlar');
            
            if (rol === 'USTA') {
                ustaAlani.style.display = 'block';
            } else {
                ustaAlani.style.display = 'none';
                document.getElementById('tcno').value = ''; // Müşteriye dönülürse içeriği temizle
            }
        }

        async function kayitOl() {
            const rol = document.getElementById('rol').value;
            
            const veri = {
                ad: document.getElementById('ad').value.trim(),
                soyad: document.getElementById('soyad').value.trim(),
                eposta: document.getElementById('eposta').value.trim(),
                sifre: document.getElementById('sifre').value.trim(),
                rol: rol,
                // Eğer usta seçiliyse TC'yi al, değilse boş gönder veya hiç gönderme
                tcno: rol === 'USTA' ? document.getElementById('tcno').value.trim() : null
                
            };
            console.log(veri);

            // Basit bir doğrulama: Usta seçiliyse TC boş olmasın
            if (rol === 'USTA' && !veri.tcno) {
                alert("Lütfen TC Kimlik numaranızı giriniz.");
                return;
            }
            

            try {
                const response = await fetch('/kaydol', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(veri)
                });

                if (response.ok) {
                    document.getElementById('mesaj').innerText = "Başarıyla kaydedildi!";
                    document.getElementById('mesaj').style.color = "green";
                } else {
                    let hataMesaji = "Hata oluştu!";
                    const raw = await response.text();
                    const contentType = response.headers.get('content-type') || '';
                    let data = null;

                    if (raw && contentType.includes('application/json')) {
                        try { data = JSON.parse(raw); } catch {}
                    }

                    console.log('Hata response:', {
                        status: response.status,
                        contentType,
                        raw
                    });

                    if (data && data.errors && Array.isArray(data.errors) && data.errors.length > 0) {
                        hataMesaji = data.errors
                            .map(e => `${e.field || 'alan'}: ${e.message || 'geçersiz'}`)
                            .join(', ');
                    } else if (data && data.message) {
                        hataMesaji = data.message;
                    } else if (raw) {
                        hataMesaji = raw;
                    }

                    document.getElementById('mesaj').innerText = hataMesaji;
                    document.getElementById('mesaj').style.color = "red";
                }
            } catch (error) {
                console.error("Hata:", error);
                document.getElementById('mesaj').innerText = "Sunucuya bağlanılamadı.";
            }
        }

    </script>
</body>
</html>
