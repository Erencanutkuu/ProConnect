<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ProConnect - Kayıt Ol</title>
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <div class="form-container">
        <h2>Kayıt Ol</h2>
        <input type="text" id="ad" placeholder="Ad">
        <input type="text" id="soyad" placeholder="Soyad">
        <input type="email" id="eposta" placeholder="E-posta">
        <input type="tel" id="telefon" placeholder="Telefon Numarası">
        <input type="password" id="sifre" placeholder="Şifre">
        <div id="password-strength-container" class="password-strength-container">
            <div id="password-strength-bar" class="password-strength-bar"></div>
        </div>
        <div id="password-hint" class="password-hint">Şifreniz en az 6 karakter olmalıdır.</div>
        <select id="rol" onchange="rolDegisti()">
            <option value="MUSTERI">Müşteri</option>
            <option value="USTA">Usta</option>
        </select>

        <div id="usta-ozel-alanlar">
            <input type="text" id="tcno" placeholder="TC Kimlik No" maxlength="11">
        </div>

        <button onclick="kayitOl()">Kaydet</button>
        <p id="mesaj"></p>
        <a href="login.html" class="geri-link">&larr; Giriş Yap</a>
        <a href="index.html" class="geri-link">&larr; Ana Sayfaya Dön</a>
    </div>

    <script>
        function rolDegisti() {
            const rol = document.getElementById('rol').value;
            const ustaAlani = document.getElementById('usta-ozel-alanlar');
            if (rol === 'USTA') {
                ustaAlani.style.display = 'block';
            } else {
                ustaAlani.style.display = 'none';
                document.getElementById('tcno').value = '';
            }
        }

        document.getElementById('sifre').addEventListener('input', function(e) {
            const val = e.target.value;
            const container = document.getElementById('password-strength-container');
            const bar = document.getElementById('password-strength-bar');
            const hint = document.getElementById('password-hint');

            if (val.length > 0) {
                container.style.display = 'block';
                hint.style.display = 'block';
                
                bar.className = 'password-strength-bar'; // reset
                if (val.length < 6) {
                    bar.classList.add('strength-weak');
                    hint.innerText = "Zayıf: Şifreniz en az 6 karakter olmalıdır.";
                } else if (val.length >= 6 && val.length < 10) {
                    if (/[0-9]/.test(val) && /[a-zA-Z]/.test(val)) {
                        bar.classList.add('strength-medium');
                        hint.innerText = "Orta: Daha güçlü bir şifre için özel karakter kullanın.";
                    } else {
                        bar.classList.add('strength-weak');
                        hint.innerText = "Zayıf: Harf ve rakamları karıştırın.";
                    }
                } else {
                    if (/[0-9]/.test(val) && /[a-zA-Z]/.test(val) && /[^a-zA-Z0-9]/.test(val)) {
                        bar.classList.add('strength-strong');
                        hint.innerText = "Güçlü: Harika bir şifre!";
                    } else {
                        bar.classList.add('strength-medium');
                        hint.innerText = "Orta: Daha güçlü bir şifre için özel karakter kullanın.";
                    }
                }
            } else {
                container.style.display = 'none';
                hint.style.display = 'none';
            }
        });

        async function kayitOl() {
            const bar = document.getElementById('password-strength-bar');
            const sifre = document.getElementById('sifre').value.trim();
            
            if (!sifre || !bar.classList.contains('strength-strong')) {
                document.getElementById('mesaj').innerText = "Kayıt olabilmek için şifrenizin yeterince güçlü (yeşil) olması gerekmektedir.";
                document.getElementById('mesaj').style.color = "red";
                return;
            }

            const rol = document.getElementById('rol').value;
            const veri = {
                ad: document.getElementById('ad').value.trim(),
                soyad: document.getElementById('soyad').value.trim(),
                eposta: document.getElementById('eposta').value.trim(),
                telefon: document.getElementById('telefon').value.trim(),
                sifre: sifre,
                rol: rol,
                tcno: rol === 'USTA' ? document.getElementById('tcno').value.trim() : null
            };

            if (rol === 'USTA' && !veri.tcno) {
                alert("Lütfen TC Kimlik numaranızı giriniz.");
                return;
            }

            try {
                const response = await fetch('/kaydol', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(veri)
                });

                if (response.ok) {
                    document.getElementById('mesaj').innerText = "Kayıt başarılı! E-postanıza doğrulama kodu gönderildi. Giriş yaptıktan sonra profilinizden doğrulama yapabilirsiniz.";
                    document.getElementById('mesaj').style.color = "green";
                } else {
                    let hataMesaji = "Hata oluştu!";
                    const raw = await response.text();
                    const contentType = response.headers.get('content-type') || '';
                    let data = null;

                    if (raw && contentType.includes('application/json')) {
                        try { data = JSON.parse(raw); } catch {}
                    }

                    if (data && data.errors && Array.isArray(data.errors) && data.errors.length > 0) {
                        hataMesaji = data.errors.map(e => (e.field || 'alan') + ': ' + (e.message || 'geçersiz')).join(', ');
                    } else if (data && data.message) {
                        hataMesaji = data.message;
                    } else if (raw) {
                        hataMesaji = raw;
                    }

                    document.getElementById('mesaj').innerText = hataMesaji;
                    document.getElementById('mesaj').style.color = "red";
                }
            } catch (error) {
                document.getElementById('mesaj').innerText = "Sunucuya bağlanılamadı.";
            }
        }
    </script>
</body>
</html>
