<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ProConnect - Giriş Yap</title>
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <div class="form-container">
        <h2>Giriş Yap</h2>
        <input type="email" id="login-eposta" placeholder="E-posta">
        <input type="password" id="login-sifre" placeholder="Şifre">
        <button onclick="girisYap()">Giriş</button>
        <p id="login-mesaj"></p>
        <a href="kayit.html" class="geri-link">← Kayıt Ol</a>
        <a href="index.html" class="geri-link">← Ana Sayfaya Dön</a>
    </div>

    <script>
        async function girisYap() {
            const veri = {
                eposta: document.getElementById('login-eposta').value.trim(),
                sifre: document.getElementById('login-sifre').value.trim()
            };

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(veri)
                });

                if (response.ok) {
                    document.getElementById('login-mesaj').innerText = "Giriş başarılı! Yönlendiriliyorsunuz...";
                    document.getElementById('login-mesaj').style.color = "green";
                    setTimeout(function() { window.location.href = 'index.html'; }, 1000);
                } else {
                    const raw = await response.text();
                    document.getElementById('login-mesaj').innerText = raw || "Giriş başarısız!";
                    document.getElementById('login-mesaj').style.color = "red";
                }
            } catch (error) {
                console.error("Hata:", error);
                document.getElementById('login-mesaj').innerText = "Sunucuya bağlanılamadı.";
                document.getElementById('login-mesaj').style.color = "red";
            }
        }
    </script>
</body>
</html>
